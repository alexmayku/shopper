<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>{{NAME}} · Mock Tesco</title></head>
<body>
  <header><h1>Mock Tesco</h1></header>
  <main>
    <article data-product-id="{{ID}}">
      <h2 data-product-name>{{NAME}}</h2>
      <p data-product-price>£{{PRICE}}</p>
      <p data-product-category>{{CATEGORY}}</p>
      <form method="post" action="/basket/add">
        <input type="hidden" name="product_id" value="{{ID}}">
        <input type="number" name="quantity" value="1" min="1" id="quantity">
        <button type="submit" id="add-to-basket">Add to basket</button>
      </form>
    </article>
  </main>
</body>
</html>
