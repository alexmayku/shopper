<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>{{NAME}} · Mock Tesco</title></head>
<body>
  <header><h1>Mock Tesco</h1></header>
  <main>
    <article data-product-id="{{ID}}">
      <h2 data-product-name>{{NAME}}</h2>
      <p data-product-price>£{{PRICE}}</p>
      <p data-product-category>{{CATEGORY}}</p>
      <p>This product's currently out of stock</p>
    </article>
  </main>
</body>
</html>
