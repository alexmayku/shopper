# Kamal 2 deployment for Kart (staging).
# Three services + a Postgres accessory on a single Hetzner box.
# Production environment is added in Prompt 27.

service: kart
image: kart

servers:
  web:
    hosts:
      - <%= ENV.fetch("KART_WEB_HOST", "STAGING_IP") %>
    options:
      add-host: host.docker.internal:host-gateway
  worker:
    hosts:
      - <%= ENV.fetch("KART_WEB_HOST", "STAGING_IP") %>
    cmd: bin/jobs
  sidecar:
    hosts:
      - <%= ENV.fetch("KART_WEB_HOST", "STAGING_IP") %>
    image: kart-sidecar
    cmd: node src/server.js
    options:
      publish:
        - "127.0.0.1:4001:4001"
        - "127.0.0.1:4002:4002"

proxy:
  ssl: true
  host: <%= ENV.fetch("KART_HOST", "staging.kart.app") %>
  app_port: 3000

registry:
  server: ghcr.io
  username:
    - KAMAL_REGISTRY_USERNAME
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  clear:
    APP_HOST: https://<%= ENV.fetch("KART_HOST", "staging.kart.app") %>
    SIDECAR_URL: http://kart-sidecar:4001
    TESCO_BASE_URL: http://kart-sidecar:4002
    TESCO_MODE: mock
    SOLID_QUEUE_IN_PUMA: false
    DB_HOST: kart-db
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_URL
    - SECRET_KEY_BASE
    - ANTHROPIC_API_KEY
    - STRIPE_SECRET_KEY
    - STRIPE_WEBHOOK_SECRET
    - STRIPE_PRICE_ID_MONTHLY
    - STRIPE_PRICE_ID_ANNUAL
    - RESEND_API_KEY
    - SIDECAR_HMAC_SECRET

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell:   app exec --interactive --reuse "bash"
  logs:    app logs -f
  migrate: app exec --reuse "bin/rails db:migrate"

volumes:
  - "kart_storage:/rails/storage"

asset_path: /rails/public/assets

builder:
  arch: amd64

accessories:
  db:
    image: postgres:16
    host: <%= ENV.fetch("KART_WEB_HOST", "STAGING_IP") %>
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_USER: kart
        POSTGRES_DB: kart_production
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data

# Run db:prepare after every successful deploy.
hooks:
  post-deploy:
    - kamal app exec --reuse "bin/rails db:prepare"
